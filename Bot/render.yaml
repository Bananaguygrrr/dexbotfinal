services:
  - type: web
    name: vehicle-bot
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /
    envVars:
      - key: DISCORD_TOKEN
        scope: run
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: 8080
    disks:
      - name: bot-data
        mountPath: /data
