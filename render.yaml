services:
  - type: web
    name: dexbotfinal
    runtime: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      python3 -m py_compile bot.py bot_runner.py guess_game_patch.py
      g++ -std=c++17 -O2 -Wall -Wextra -pedantic main.cpp -o dexbot_boot
    startCommand: ./dexbot_boot
    healthCheckPath: /health
    disk:
      name: dexbot-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: DEXBOT_PYTHON_COMMAND
        value: python3 bot_runner.py
      - key: GUESS_GAME_DEFAULT_ROUNDS
        value: "5"
      - key: GUESS_GAME_DEFAULT_SECONDS
        value: "30"
      - key: GUESS_GAME_MAX_ROUNDS
        value: "20"
      - key: GUESS_GAME_MAX_SECONDS
        value: "120"
      - key: ENABLE_INSTANCE_LOCK
        value: "false"
      - key: AUTO_RESTART_BOT
        value: "false"
      - key: SPAWN_RATE
        value: "50"
      - key: SPAWN_DESPAWN_SECONDS
        value: "240"
      - key: FRESH_SPAWN_CHANCE
        value: "0.005"
      - key: EVENT_FRESH_SPAWN_CHANCE
        value: "0.05"
      - key: EVENT_SPAWN_DESPAWN_SECONDS
        value: "60"
      - key: EVENT_MAX_SPAWNS
        value: "25"
      - key: EVENT_SPAWN_DELAY_SECONDS
        value: "3"
      - key: COMMAND_SYNC_MODE
        value: global
